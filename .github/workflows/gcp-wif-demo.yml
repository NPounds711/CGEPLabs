name: GCP WIF Demo

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  gcp-auth:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/56606750432/locations/global/workloadIdentityPools/github-actions/providers/github
          service_account: cgep-grc-gate-sa@corded-keel-450918-i6.iam.gserviceaccount.com

      - name: Verify GCP identity
        run: gcloud auth list
